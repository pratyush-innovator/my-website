<html>
<head>

    <link rel="stylesheet" href="style.css">

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');

<body>

<img src="pk.png" width="150px">

<h1>Welcome to Pratyush's official website!</h1>

<div id="profile">
    <h2>About Me</h2>
    <p>Namaste! Main Pratyush hoon. Main ek coder hoon aur mujhe naye projects banana pasand hai.</p>
    <p>Age: 15 saal</p>
    <p>Mera maqsad hai technology ki duniya mein kuch bada karna!</p>
</div>

</body>
<div id="chat-container">
    <div id="chat-history"></div>
    <input type="text" id="user-input" placeholder="AI se kuch pucho...">
    <button onclick="getAIResponse()">Send</button>
</div>
<script>
function getAIResponse() {
    let userInput = document.getElementById("user-input").value;
    let chatHistory = document.getElementById("chat-history");
    
    // User ka message dikhao
    chatHistory.innerHTML += "<p><b>Tum:</b> " + userInput + "</p>";
    
    // AI ka response (abhi basic rakha hai)
    chatHistory.innerHTML += "<p><b>AI:</b> Main abhi seekh raha hoon, Pratyush!</p>";
    
    // Input box khali karo
    document.getElementById("user-input").value = "";
}
</script>
