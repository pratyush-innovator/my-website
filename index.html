<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pratyush's AI Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <h1>Welcome to Pratyush's Official Website!</h1>
    <p>15-year-old student, tech enthusiast, and future innovator.</p>

    <!-- AI Feature Section -->
    <div id="ai-section" style="margin: 20px; padding: 20px; border: 2px dashed #007bff;">
        <h2>AI Assistant (Offline Ready)</h2>
        <input type="text" id="user-input" placeholder="Kuch pucho...">
        <button onclick="handleAI()">Ask AI</button>
        <div id="response-area" style="margin-top: 10px; font-weight: bold;"></div>
    </div>

    <script type="module"
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('Service Worker registered successfully!'));
        }

      
       
        // AI Pipeline (Offline - Transformers.js)
import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

const classifier = await pipeline('sentiment-analysis');

async function handleAI() {
    const input = document.getElementById('user-input').value;
    const output = document.getElementById('response-area');
    
    output.innerText = "Thinking...";
    const result = await classifier(input);
    
    // Yahan AI ka output dikhega
    output.innerText = "AI: " + result[0].label + " (" + Math.round(result[0].score * 100) + "%)";
}
window.handleAI = handleAI; // Button ko function dikhane ke liye
    </script>
</body>
</html>
